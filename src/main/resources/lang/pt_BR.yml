addon: "RebarWrench"

item:
  wrench:
    name: "Chave Inglesa"
    lore: |-
      <arrow> Uma chave inglesa.
      <arrow> <insn><key:key.sneak></insn> + <insn><key:key.attack></insn> para quebrar o bloco rapidamente
      <arrow> <insn><key:key.use></insn> para configurar
      <arrow> <insn><key:key.sneak></insn> + <insn><key:key.use></insn> para girar

message:
  not_usable: "<red>Você não pode usar isto neste bloco."
  operation_unsupported: "<red>Esta operação não é suportada."
