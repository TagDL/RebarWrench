addon: "RebarWrench"

item:
  wrench:
    name: "Wrench"
    lore: |-
      <arrow> A wrench.
      <arrow> <insn><key:key.sneak></insn> + <insn><key:key.attack></insn> to fast break the block
      <arrow> <insn><key:key.use></insn> to configure
      <arrow> <insn><key:key.sneak></insn> + <insn><key:key.use></insn> to rotate

message:
  not_usable: "<red>You cannot use it on this block!"
  operation_unsupported: "<red>This operation is not supported!"
